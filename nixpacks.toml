[phases.setup]
nixPkgs = ["nodejs_22", "python311", "gcc"]

[phases.install]
cmds = [
  "npm ci",
  "python3 -m venv venv",
  ". venv/bin/activate && pip install -r requirements.txt"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = ". venv/bin/activate && uvicorn main:app --host 0.0.0.0 --port 8000 & npm run start"
